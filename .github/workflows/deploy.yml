name: CI — Test & Deploy

on:
  push:
    branches:
      - develop
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql, xml, ctype, fileinfo, openssl, curl, zip

      - name: Copy .env
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/phpunit --testsuite=Core
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  # Railway auto-deploys from GitHub when tests pass on main.
  # No manual deploy step needed.
