[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=10
stderr_logfile=/var/log/supervisor/php-fpm.err.log
stdout_logfile=/var/log/supervisor/php-fpm.out.log

[program:laravel-setup]
command=/bin/sh -c "sleep 2 && php /app/artisan key:generate --force --no-interaction; php /app/artisan migrate --force && php /app/artisan config:cache && php /app/artisan route:cache && php /app/artisan view:cache"
autostart=true
autorestart=false
startsecs=0
priority=20
stderr_logfile=/var/log/supervisor/laravel-setup.err.log
stdout_logfile=/var/log/supervisor/laravel-setup.out.log

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=30
stderr_logfile=/var/log/supervisor/nginx.err.log
stdout_logfile=/var/log/supervisor/nginx.out.log
